name: moov-togo
service:
  name: api
  instance_type: nano
  port: 4000
  env:
    - key: PORT
      value: "4000"
    - key: NODE_ENV
      value: "production"
  routes:
    - path: /
      port: 4000
  scalings:
    min: 0
    max: 1
  build:
    builder: buildpack
    build_command: npm install && npx prisma generate
    run_command: npx prisma migrate deploy && node src/index.js
